name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: skill_bridge_test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d skill_bridge_test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: ci-test-secret-key-not-for-prod
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      POSTGRES_DB: skill_bridge_test_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_HOST: localhost
      REDIS_PORT: "6379"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Django check
        run: uv run python manage.py check

      - name: Check migrations
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: uv run pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: skillbridge-web:ci
          load: true

      - name: Smoke-test image (django check)
        run: |
          docker run --rm \
            -e DJANGO_SETTINGS_MODULE=config.settings \
            -e SECRET_KEY=ci-smoke \
            -e DEBUG=False \
            -e ALLOWED_HOSTS=localhost \
            skillbridge-web:ci \
            python manage.py check
